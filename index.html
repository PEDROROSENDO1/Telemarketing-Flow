<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="shortcut icon" href="/public/icons/Rocket/LogoRocket.svg" type="image/svg" />
    <title>Telemarketing Flow</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="content">
        <div class="section" id="prompt">
            <button class="back-button" id="backButton" onclick="goBack()">← Voltar</button>
            <div class="step-indicator" id="stepIndicator">Passo 1/10</div>

            <div id="promptext">
                <h1 id="mainText"></h1>

                <div id="subtextContainer">

                </div>
            </div>

            <div id="options">
                <div class="buttonsection" id="buttonContainer">
                    <button class="button" onclick="handleResponse('sim')">
                        <h2>SIM</h2>
                    </button>
                    <button class="button" onclick="handleResponse('nao')">
                        <h2>NÃO</h2>
                    </button>
                </div>
            </div>
        </div>

        <div class="section" id="notes">
            <div class="notes-title">Anotações da Chamada</div>
            <textarea class="textarea" id="notesArea"
                placeholder="Digite suas anotações aqui...&#10;&#10;- Nome do cliente:&#10;- Empresa:&#10;- Telefone:&#10;- Observações:"></textarea>
        </div>
    </div>

    <script>
        const flowData = {
            start: {
                text: "[Nome da Pessoa], aqui é o [Seu nome] da Rocket. Tudo bem? [PAUSA] [Nome da Pessoa], basicamente o motivo dessa ligação é que eu e minha equipe identificamos sua empresa na região, e isso acendeu um alerta de oportunidade não aproveitada no nosso sistema. Você teria 30 segundos para eu explicar o que está acontecendo?",
                subtext: [
                    "Tonalidade: Confiança absoluta, energia contagiante e autoridade instantânea.",
                    "Não use tom de vendedor carente; fale como um especialista que traz uma informação vital.",
                    "Se houver relutância, firme a voz e mantenha o foco na oportunidade de mercado."
                ],
                options: [
                    { text: "PODE FALAR / SIM", action: "interessado" },
                    { text: "NÃO É COMIGO", action: "pegar_contato" },
                    { text: "DE ONDE TIROU ISSO?", action: "curiosidade" },
                    { text: "NÃO TENHO INTERESSE", action: "objecao_inicial" }
                ],
                step: 1
            },

            objecao_inicial: {
                text: "Entendo que seu tempo está corrido, [Nome da Pessoa], e por isso vou ser bem direto ao ponto. O que quero te mostrar é um diagnóstico simples sobre perdas de clientes e dinheiro que você está tendo e não está vendo. Vou agendar para você uma pequena reunião de 20 minutos. Fica melhor para você amanhã às 12h ou às 17h?",
                subtext: [
                    "Tonalidade: Totalmente assertivo. Responda imediatamente, sem hesitar.",
                    "Técnica: Deflexão em linha reta. Use a pressa dele a seu favor."
                ],
                options: [
                    { text: "ACEITOU OUVIR", action: "interessado" },
                    { text: "RECUSOU TOTALMENTE", action: "objecao_total" }
                ],
                step: 1
            },

            interessado: {
                text: "[Nome da Pessoa], me responde só uma coisa. Hoje, quando um cliente procura seu serviço na internet, ele encontra sua empresa ou um concorrente?",
                subtext: [
                    "Tonalidade: Tom consultivo, de diagnóstico médico sério.",
                    "Faça a pergunta e faça um silêncio absoluto. Deixe o cliente sentir o peso de estar vulnerável no mercado.",
                    "Direcione o cliente a admitir que a presença digital dele está deixando a desejar."
                ],
                options: [
                    { text: "SE QUALIFICA / ADMITIU FALHA", action: "qualifica" },
                    { text: "DIZ QUE JÁ ESTÁ PERFEITO", action: "objecao_jatenho" },
                    { text: "NÃO SE QUALIFICA", action: "nao_qualifica" }
                ],
                step: 2
            },

            objecao_jatenho: {
                text: "Ótimo saber que você já investe no digital, [Nome da Pessoa]. Isso mostra que você entende a importância desse canal. Mesmo assim, identificamos um possível gargalo entre o interesse do cliente e a venda. É exatamente isso que eu gostaria de te mostrar. Fica melhor para você amanhã às 12h ou depois de amanhã às 17h?",
                subtext: [
                    "Técnica: Elogie para desarmar o ego e em seguida mude o foco para métricas reais de dinheiro/conversão."
                ],
                options: [
                    { text: "ACEITOU CONFERIR", action: "qualifica" },
                    { text: "VOU PENSAR E TE FALO", action: "objecao_vou_pensar" }
                ],
                step: 2
            },

            pegar_contato: {
                text: "Entendi, [Nome da Pessoa]. Nesse caso, você poderia me passar o contato da pessoa responsável por negócios ou pelas decisões estratégicas? Assim eu direciono melhor essa análise para quem cuida disso.",
                subtext: [
                    "Tonalidade: Extremamente profissional e burocrático, parecendo uma entrega de documento corporativo obrigatório."
                ],
                options: [
                    { text: "FINALIZAR ATENDIMENTO", action: "fim" }
                ],
                step: 2
            },

            curiosidade: {
                text: "Basicamente, nós analisamos dados públicos, presença digital e posicionamento competitivo da sua região. Com isso, identificamos empresas que são fortes na operação, mas ainda têm pontos a melhorar e perdem para concorrentes. Sua empresa entrou nesse grupo, e é justamente essa falha que buscamos corrigir.",
                subtext: [
                    "Tonalidade: Explicação firme, objetiva e com linguagem de análise."
                ],
                options: [
                    { text: "AVANÇAR PARA DIAGNÓSTICO", action: "interessado" },
                    { text: "ISSO É UMA VENDA?", action: "desconfia" }
                ],
                step: 2
            },

            objecao_total: {
                text: "Sem problema, [Nome da Pessoa], respeito sua decisão. Vou encerrar por aqui. Sucesso ao seu negócio.",
                subtext: [
                    "Técnica: Desapego total e encerramento respeitoso."
                ],
                options: [
                    { text: "FINALIZAR", action: "fim" }
                ],
                step: 2
            },

            qualifica: {
                text: "O cenário é simples, [Nome da Pessoa]: sua empresa tem potencial, mas pode estar perdendo vendas por falhas no processo digital. Em vez de tentar te vender algo agora, prefiro te mostrar isso na prática em uma reunião rápida de 15 minutos. Entre amanhã às 14h e quinta às 10h, qual horário funciona melhor?",
                subtext: [
                    "Técnica: Fechamento presumido (Assumptive Close) com dupla alternativa de escolha.",
                    "Nunca pergunte se ele quer ou se ele pode; dê as opções de horário como se a reunião já estivesse marcada."
                ],
                options: [
                    { text: "ACEITOU REUNIÃO", action: "reuniao_sucesso" },
                    { text: "VOU PENSAR E TE FALO", action: "objecao_vou_pensar" },
                    { text: "PRECISO VER COM MEU SÓCIO", action: "objecao_socio" },
                    { text: "ME MANDA NO WHATSAPP", action: "wpp" }
                ],
                step: 3
            },

            objecao_vou_pensar: {
                text: "Eu entendo perfeitamente o seu lado, [Nome da Pessoa]. Mas, para ser 100% transparente com você, na minha experiência prática ajudando dezenas de empresas a escalarem, quando um empresário de ponta me diz que vai pensar, geralmente é por um de dois motivos: ou ele não viu sentido nenhum na oportunidade e só está sendo educado para não me dizer um não, ou ele gostou muito, mas ficou com alguma dúvida oculta na mente que eu ainda não esclareci. Sendo totalmente franco comigo, qual dos dois cenários é o seu?",
                subtext: [
                    "Tonalidade: Voz mansa, calma, porém cirúrgica e firme.",
                    "PAUSA ABSOLUTA após a pergunta. Deixe o silêncio constranger o cliente até que ele se explique.",
                    "Aqui nós destruímos a mentira e isolamos o problema real."
                ],
                options: [
                    { text: "ADMITIU DÚVIDA / MEDO", action: "esclarecer_duvida" },
                    { text: "NÃO VIU SENTIDO", action: "nao_qualifica" }
                ],
                step: 3
            },

            esclarecer_duvida: {
                text: "Perfeito, obrigado pela sinceridade. Então vamos direto ao ponto: o que te impede hoje de separar 15 minutos para analisar possíveis perdas de venda na sua empresa? É falta de tempo na agenda ou isso ainda não parece prioridade para você?",
                subtext: [
                    "Técnica: Encurralar a desculpa mostrando que recusar olhar os dados é o mesmo que ignorar o crescimento da própria empresa."
                ],
                options: [
                    { text: "VOLTAR PRO FECHAMENTO", action: "qualifica" },
                    { text: "DESCARTAR / ENCERRAR", action: "fim" }
                ],
                step: 3
            },

            objecao_socio: {
                text: "Perfeito, isso mostra que vocês levam a gestão a sério. Por isso, faz mais sentido eu te apresentar primeiro os dados e o diagnóstico. Em 15 minutos você entende o cenário e, se enxergar valor, eu ainda te ajudo a levar isso de forma clara para o seu sócio. Podemos deixar [Data que ele quis]?",
                subtext: [
                    "Técnica: Assuma a responsabilidade de municiar o contato com argumentos para que ele vença o sócio depois."
                ],
                options: [
                    { text: "ACEITOU REUNIÃO", action: "reuniao_sucesso" },
                    { text: "RECUSOU TOTALMENTE", action: "fim" }
                ],
                step: 3
            },

            nao_qualifica: {
                text: "Entendi, [Nome da Pessoa]. Pelo que conversamos, talvez este ainda não seja o melhor momento para avançar com esse tipo de solução. Vou deixar seu contato arquivado e podemos retomar isso no futuro, se fizer sentido.",
                subtext: [
                    "Tonalidade: Autoridade de quem desqualifica o lead."
                ],
                options: [
                    { text: "REINICIAR FLUXO", action: "restart" }
                ],
                step: 3
            },

            fim: {
                text: "Atendimento encerrado. Registre as informações importantes nas anotações e siga para o próximo contato.",
                options: [
                    { text: "REINICIAR FLUXO", action: "restart" }
                ],
                step: 3
            },

            desconfia: {
                text: "Ótima pergunta. Minha proposta aqui não é te vender algo no telefone, e sim te mostrar um diagnóstico técnico gratuito. Se fizer sentido para sua empresa, avançamos depois. Se não fizer, você pelo menos sai com uma visão mais clara dos pontos que pode melhorar. Podemos marcar para amanhã [Horário]?",
                subtext: [
                    "Técnica: Redução de resistência e clareza de proposta."
                ],
                options: [
                    { text: "AVANÇAR PARA PERGUNTAS", action: "interessado" }
                ],
                step: 3
            },

            reuniao_sucesso: {
                text: "Perfeito, [Nome da Pessoa]. Reservei aqui o seu horário de 15 minutos. Agora me passe seu melhor e-mail ou WhatsApp para eu te enviar o convite com o link da reunião.",
                subtext: [
                    "Tonalidade: Tom de encerramento firme. Defina o compromisso como algo importante e de valor."
                ],
                options: [
                    { text: "FINALIZAR AGENDAMENTO", action: "fim" }
                ],
                step: 4
            },

            wpp: {
                text: "Posso te enviar algo no WhatsApp, sim, mas esse tipo de análise faz mais sentido com uma explicação rápida junto. Então proponho o seguinte: marcamos 15 minutos e, se nos primeiros 5 você perceber que não faz sentido, encerramos sem problema. Qual é o seu WhatsApp para eu te mandar o link?",
                subtext: [
                    "Técnica: Redução do custo percebido e quebra de objeção do material escrito."
                ],
                options: [
                    { text: "PASSOU O WHATSAPP", action: "reuniao_sucesso" },
                    { text: "RECUSOU ENVIAR", action: "objecao_vou_pensar" }
                ],
                step: 4
            }
        };

        let currentFlow = "start";
        let history = [];

        function formatTextWithBrackets(text) {
            return text.replace(/\[(.*?)\]/g, '<span class="bracket-text">[$1]</span>');
        }

        function handleResponse(action) {
            history.push(currentFlow);
            currentFlow = action;
            updateFlow();
        }

        function updateFlow() {
            const flow = flowData[currentFlow];
            if (!flow) {
                console.error("Flow não encontrado:", currentFlow);
                return;
            }

            document.getElementById("mainText").innerHTML = formatTextWithBrackets(flow.text);
            document.getElementById("stepIndicator").textContent = `Passo ${flow.step}/10`;

            const subtextContainer = document.getElementById("subtextContainer");
            subtextContainer.innerHTML = "";

            if (flow.subtext) {
                flow.subtext.forEach(text => {
                    const p = document.createElement("p");
                    p.innerHTML = formatTextWithBrackets(text);
                    subtextContainer.appendChild(p);
                });
            }

            const backButton = document.getElementById("backButton");
            backButton.disabled = history.length === 0;

            const container = document.getElementById("buttonContainer");
            container.innerHTML = "";

            flow.options.forEach(option => {
                const button = document.createElement("button");
                button.className = "button";
                button.onclick = () => {
                    if (option.action === "restart") {
                        restartFlow();
                    } else {
                        handleResponse(option.action);
                    }
                };

                const h2 = document.createElement("h2");
                h2.innerHTML = formatTextWithBrackets(option.text);
                button.appendChild(h2);
                container.appendChild(button);
            });
        }

        function goBack() {
            if (history.length > 0) {
                currentFlow = history.pop();
                updateFlow();
            }
        }

        function restartFlow() {
            currentFlow = "start";
            history = [];
            updateFlow();
            document.getElementById("notesArea").value = "";
        }

        updateFlow();
    </script>
</body>

</html>
