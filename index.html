<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="shortcut icon" href="/public/icons/Rocket/LogoRocket.svg" type="image/svg" />
    <title>Telemarketing Flow</title>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div class="content">
        <div class="section" id="prompt">
            <button class="back-button" id="backButton" onclick="goBack()">← Voltar</button>
            <div class="step-indicator" id="stepIndicator">Passo 1/10</div>

            <div id="promptext">
                <h1 id="mainText"></h1>

                <div id="subtextContainer">

                </div>
            </div>

            <div id="options">
                <div class="buttonsection" id="buttonContainer">
                    <button class="button" onclick="handleResponse('sim')">
                        <h2>SIM</h2>
                    </button>
                    <button class="button" onclick="handleResponse('nao')">
                        <h2>NÃO</h2>
                    </button>
                </div>
            </div>
        </div>

        <div class="section" id="notes">
            <div class="notes-title">Anotações da Chamada</div>
            <textarea class="textarea" id="notesArea"
                placeholder="Digite suas anotações aqui...&#10;&#10;- Nome do cliente:&#10;- Empresa:&#10;- Telefone:&#10;- Observações:"></textarea>
        </div>
    </div>

    <script>
        const flowData = {
            start: {
                text: "[Nome da Pessoa], aqui é o Pedro da Rocket. Tudo bem? [PAUSA] [Nome da Pessoa], vou ser extremamente direto com você em respeito ao seu tempo precioso. Minha equipe de inteligência corporativa mapeou o ecossistema comercial da região, e o nome da sua empresa acendeu um alerta vermelho de oportunidade não aproveitada no nosso sistema de auditoria. Você tem 30 segundos rápidos para eu te explicar exatamente o que está acontecendo na sua mesa?",
                subtext: [
                    "Tonalidade: Confiança absoluta, energia contagiante e autoridade instantânea.",
                    "Não use tom de vendedor carente; fale como um especialista que traz uma informação vital.",
                    "Se houver relutância, firme a voz e mantenha o foco na oportunidade de mercado."
                ],
                options: [
                    { text: "PODE FALAR / SIM", action: "interessado" },
                    { text: "NÃO É COMIGO", action: "pegar_contato" },
                    { text: "DE ONDE TIROU ISSO?", action: "curiosidade" },
                    { text: "NÃO TENHO INTERESSE", action: "objecao_inicial" }
                ],
                step: 1
            },

            objecao_inicial: {
                text: "Eu entendo perfeitamente que você está ultra ocupado e que seu tempo vale ouro, [Nome da Pessoa]. É exatamente por esse motivo que estou te ligando. Se fosse uma ligação comum de vendas eu nem gastaria meus minutos e muito menos os seus. Estou falando de um diagnóstico de vazamento de receita na sua empresa que leva exatos 15 minutos para ser visualizado em tela. Me dê um voto de confiança: o que é melhor para você conferir isso, amanhã à tarde ou quinta pela manhã?",
                subtext: [
                    "Tonalidade: Totalmente assertivo. Responda imediatamente, sem hesitar.",
                    "Técnica: Deflexão em linha reta. Use a pressa dele a seu favor."
                ],
                options: [
                    { text: "ACEITOU OUVIR", action: "interessado" },
                    { text: "RECUSOU TOTALMENTE", action: "objecao_total" }
                ],
                step: 1
            },

            interessado: {
                text: "[Nome da Pessoa]! Para eu validar se a sua empresa cumpre os pré-requisitos para este lote exclusivo de alavancagem regional... Me responde apenas uma coisa: Hoje, se um cliente com dinheiro no bolso procurar pelo seu tipo de serviço no ambiente digital, ele vai encontrar uma estrutura de autoridade absoluta da sua empresa, ou ele vai acabar caindo direto no colo do seu concorrente que está mais posicionado?",
                subtext: [
                    "Tonalidade: Tom consultivo, de diagnóstico médico sério.",
                    "Faça a pergunta e faça um silêncio absoluto. Deixe o cliente sentir o peso de estar vulnerável no mercado.",
                    "Direcione o cliente a admitir que a presença digital dele está deixando a desejar."
                ],
                options: [
                    { text: "SE QUALIFICA (ADMITIU FALHA)", action: "qualifica" },
                    { text: "DIZ QUE JÁ ESTÁ PERFEITO", action: "objecao_ja_tenho" },
                    { text: "NÃO SE QUALIFICA", action: "nao_qualifica" }
                ],
                step: 2
            },

            objecao_ja_tenho: {
                text: "Fantástico que você já investe e tem ferramentas ativas, [Nome da Pessoa]! Isso me mostra de primeira que você é um gestor que entende o valor estratégico do digital. No entanto, o que o nosso software auditou não foi a sua postagem de conteúdo superficial, mas sim um gargalo grave na sua conversão de cliques em vendas reais, onde leads qualificados estão se perdendo no processo. É justamente esse ponto cego que quero te mostrar na tela. Amanhã às [14h] ou quinta às [10h] fica melhor para abrirmos essa ferramenta?",
                subtext: [
                    "Técnica: Elogie para desarmar o ego e em seguida mude o foco para métricas reais de dinheiro/conversão."
                ],
                options: [
                    { text: "ACEITOU CONFERIR", action: "qualifica" },
                    { text: "VOU PENSAR E TE FALO", action: "objecao_vou_pensar" }
                ],
                step: 2
            },

            pegar_contato: {
                text: "Entendo perfeitamente, [Nome da Pessoa]. Como se trata de uma auditoria de alavancagem de receita voltada direto para a mesa de decisões, qual é o ramal ou o contato direto do responsável estratégico por novos negócios que eu devo reportar este relatório agora?",
                subtext: [
                    "Tonalidade: Extremamente profissional e burocrático, parecendo uma entrega de documento corporativo obrigatório."
                ],
                options: [
                    { text: "FINALIZAR ATENDIMENTO", action: "fim" },
                ],
                step: 2
            },

            curiosidade: {
                text: "Nós rodamos um cruzamento de dados públicos estruturados, performance em redes de pesquisa e inteligência competitiva local. A verdade nua e crua, [Nome da Pessoa], é que nós selecionamos cirurgicamente um grupo restrito de empresas com excelente operação offline, mas que possuem um abismo técnico digital que está entregando leads de bandeja para a concorrência. Nosso projeto corrige essa falha de receita, mas a nossa janela de atuação é exclusiva e limitada por região.",
                options: [
                    { text: "AVANÇAR PARA DIAGNÓSTICO", action: "interessado" },
                    { text: "ISSO É UMA VENDA?", action: "desconfia" }
                ],
                step: 2
            },

            objecao_total: {
                text: "Perfeito, [Nome da Pessoa], respeito totalmente sua decisão. Nosso foco exclusivo é trabalhar com marcas que estão prontas para dominar o mercado regional imediatamente. Vou arquivar o seu relatório de auditoria e liberar essa vaga de alavancagem para o próximo competidor da lista da sua rua. Desejo sucesso absoluto nos seus negócios!",
                subtext: [
                    "Técnica: Desapego total e gatilho de perda massivo (FOMO). Faça ele sentir que o concorrente vai levar a vaga."
                ],
                options: [
                    { text: "FINALIZAR", action: "fim" },
                ],
                step: 2
            },

            qualifica: {
                text: "O diagnóstico é claro, [Nome da Pessoa]: você tem uma marca excelente, mas está deixando muito dinheiro na mesa dia após dia. O próximo passo lógico não é eu tentar te vender algo por telefone, é te provar valor em tempo real. Vou abrir o nosso painel privado em uma videoconferência rápida de 15 minutos e te apontar onde o seu lucro está vazando. Para organizarmos as agendas: amanhã às [14h] ou quinta às [10h], qual dessas janelas é incontornável para você?",
                subtext: [
                    "Técnica: Fechamento Presumido (Assumptive Close) com dupla alternativa de escolha.",
                    "Nunca pergunte se ele quer ou se ele pode; dê as opções de horário como se a reunião já estivesse marcada."
                ],
                options: [
                    { text: "ACEITOU REUNIÃO", action: "reuniao_sucesso" },
                    { text: "VOU PENSAR E TE FALO", action: "objecao_vou_pensar" },
                    { text: "PRECISO VER COM MEU SÓCIO", action: "objecao_socio" },
                    { text: "ME MANDA NO WHATSAPP", action: "wpp" }
                ],
                step: 3
            },

            objecao_vou_pensar: {
                text: "Eu entendo perfeitamente o seu lado, [Nome da Pessoa]. Mas, para ser 100% transparente com você... na minha experiência prática ajudando dezenas de empresas a escalarem, quando um empresário de ponta me diz que 'vai pensar', geralmente é por um de dois motivos: ou ele não viu sentido nenhum na oportunidade e só está sendo educado para não me dizer um 'não', ou ele gostou muito, mas ficou com alguma dúvida oculta na mente que eu ainda não esclareci. Sendo totalmente franco comigo, qual dos dois cenários é o seu?",
                subtext: [
                    "Tonalidade: Voz mansa, calma, porém cirúrgica e firme.",
                    "PAUSA ABSOLUTA após a pergunta. Deixe o silêncio constranger o cliente até que ele se explique.",
                    "Aqui nós destruímos a mentira e isolamos o problema real."
                ],
                options: [
                    { text: "ADMITIU DÚVIDA / MEDO", action: "esclarecer_duvida" },
                    { text: "NÃO VIU SENTIDO", action: "nao_qualifica" }
                ],
                step: 3
            },

            esclarecer_duvida: {
                text: "Perfeito, [Nome da Pessoa], obrigado pela franqueza. Vamos direto ao ponto crítico: o que exatamente te impede hoje de investir 15 minutos para analisar dados sobre o seu próprio faturamento? É uma indisponibilidade real de tempo na agenda para evoluir a empresa, ou você sente no fundo que estancar essa perda diária de clientes para o concorrente não é a prioridade número um da sua operação hoje?",
                subtext: [
                    "Técnica: Encurralar a desculpa mostrando que recusar olhar os dados é o mesmo que ignorar o crescimento da própria empresa."
                ],
                options: [
                    { text: "VOLTAR PRO FECHAMENTO", action: "qualifica" },
                    { text: "DESCARTAR / ENCERRAR", action: "fim" }
                ],
                step: 3
            },

            objecao_socio: {
                text: "Excelente, [Nome da Pessoa]! Isso me prova que a sua estrutura corporativa é séria e responsável. E é exatamente por isso que essa reunião precisa acontecer com você primeiro. Não quero desperdiçar um minuto do tempo do seu sócio sem antes te provar de forma matemática que isso coloca dinheiro no bolso da empresa de vocês. Fazemos o seguinte: olhamos a ferramenta juntos por 15 minutos. Se você olhar e disser 'Pedro, isso é genial', eu mesmo monto um sumário executivo para você apresentar ao seu sócio com autoridade. Fechado amanhã às [14h]?",
                subtext: [
                    "Técnica: Assuma a responsabilidade de municiar o contato com argumentos para que ele vença o sócio depois."
                ],
                options: [
                    { text: "ACEITOU REUNIÃO", action: "reuniao_sucesso" },
                    { text: "RECUSOU TOTALMENTE", action: "fim" }
                ],
                step: 3
            },

            nao_qualifica: {
                text: "Perfeito, [Nome da Pessoa]. Entendido. Pelas métricas apresentadas, vejo que o seu modelo operacional atual ainda não está na maturidade ideal para absorver o volume de tração e tecnologia que a Rocket entrega. Vou deixar seu relatório arquivado e, em um momento de expansão futura, podemos reavaliar. Um abraço!",
                subtext: [
                    "Tonalidade: Autoridade de quem desqualifica o lead. O Lobo não perde tempo com quem não pode comprar."
                ],
                options: [
                    { text: "REINICIAR FLUXO", action: "restart" },
                ],
                step: 3
            },

            fim: {
                text: "Mapeamento encerrado com sucesso. Registre as informações estratégicas coletadas no campo lateral de anotações e prepare-se para a próxima discagem com foco total na meta.",
                options: [
                    { text: "REINICIAR FLUXO", action: "restart" },
                ],
                step: 3
            },

            desconfia: {
                text: "Excelente pergunta! Se a sua preocupação é eu tentar te empurrar um serviço de prateleira por telefone, pode ficar totalmente tranquilo. Isso é um diagnóstico técnico e gratuito de engenharia digital. Se o que eu te mostrar em tempo real na tela fizer completo sentido para o seu lucro líquido, nós agendamos negócios no futuro. Se não fizer, você sai da chamada com um mapa de erros estratégico de graça. O risco é inteiramente meu. Vamos abrir essa tela amanhã?",
                options: [
                    { text: "AVANÇAR PARA PERGUNTAS", action: "interessado" },
                ],
                step: 3
            },

            reuniao_sucesso: {
                text: "Excelente escolha, [Nome da Pessoa]. Acabei de travar a nossa janela de 15 minutos aqui no meu painel de auditoria. Trate esse compromisso com extrema seriedade, pois é uma consultoria estratégica de alto nível com dados que ninguém no mercado vai te mostrar de graça. Bloqueie este horário na sua agenda pessoal. Qual é o seu e-mail principal para eu disparar o convite com o link de transmissão da sala agora?",
                subtext: [
                    "Tonalidade: Tom de encerramento firme. Defina o compromisso como algo imperdível e de altíssimo valor."
                ],
                options: [
                    { text: "FINALIZAR AGENDAMENTO", action: "fim" },
                ],
                step: 4
            },

            wpp: {
                text: "Eu posso sim te mandar uma apresentação por lá, [Nome da Pessoa], mas sendo 100% transparente com você: é um ecossistema visual e técnico complexo. Sem o meu direcionamento guiando seus olhos na tela, vai virar apenas mais um PDF pesado acumulando poeira digital na sua galeria do celular. Vamos fazer o seguinte: travamos os 15 minutos. Se nos primeiros 5 você achar que é perda de tempo, desligamos na hora. Justo? Qual o seu WhatsApp oficial para eu enviar o link da sala?",
                subtext: [
                    "Técnica: Redução do custo percebido e quebra de objeção do material escrito."
                ],
                options: [
                    { text: "PASSOU O WHATSAPP", action: "reuniao_sucesso" },
                    { text: "RECUSOU ENVIAR", action: "objecao_vou_pensar" }
                ],
                step: 4
            }

        };

        let currentFlow = 'start';
        let history = [];

        function formatTextWithBrackets(text) {
            return text.replace(/\[([^\]]+)\]/g, '<span class="bracket-text">[$1]</span>');
        }

        function handleResponse(action) {
            history.push(currentFlow);
            currentFlow = action;
            updateFlow();
        }

        function updateFlow() {
            const flow = flowData[currentFlow];
            if (!flow) {
                console.error('Flow não encontrado:', currentFlow);
                return;
            }

            document.getElementById('mainText').innerHTML = formatTextWithBrackets(flow.text);
            document.getElementById('stepIndicator').textContent = `Passo ${flow.step}/10`;

            // Atualizar subtexto
            const subtextContainer = document.getElementById('subtextContainer');
            subtextContainer.innerHTML = '';

            if (flow.subtext) {
                flow.subtext.forEach(text => {
                    const p = document.createElement('p');
                    p.innerHTML = formatTextWithBrackets(text);
                    subtextContainer.appendChild(p);
                });
            }

            // Atualizar estado do botão voltar
            const backButton = document.getElementById('backButton');
            if (history.length === 0) {
                backButton.disabled = true;
            } else {
                backButton.disabled = false;
            }

            const container = document.getElementById('buttonContainer');
            container.innerHTML = '';

            flow.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'button';
                button.onclick = () => {
                    if (option.action === 'restart') {
                        restartFlow();
                    } else {
                        handleResponse(option.action);
                    }
                };

                const h2 = document.createElement('h2');
                h2.innerHTML = formatTextWithBrackets(option.text);
                button.appendChild(h2);

                container.appendChild(button);
            });
        }

        function goBack() {
            if (history.length > 0) {
                currentFlow = history.pop();
                updateFlow();
            }
        }

        function restartFlow() {
            currentFlow = 'start';
            history = [];
            updateFlow();
            document.getElementById('notesArea').value = "";
        }

        // Inicializar o fluxo
        updateFlow();
    </script>
</body>

</html>
